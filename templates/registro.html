{% extends 'base.html' %}
{% block content %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl mx-auto">

    <!-- Formulario de Registro -->
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Nuevo Usuario</h2>
        <form method="POST" action="/registro" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Nombre Completo</label>
                <input type="text" name="nombre" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Correo Electrónico</label>
                <input type="email" name="email" required
                    class="w-full px-4 py-2 border rounded-lg focus:ring-indigo-500 focus:border-indigo-500">
            </div>
            <button type="submit"
                class="w-full bg-indigo-600 text-white py-2 rounded-lg font-semibold hover:bg-indigo-700 transition">Registrar</button>
        </form>
    </div>

    <!-- Consulta de Información Embebida -->
    <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-100">
        <h2 class="text-2xl font-bold text-gray-800 mb-6">Últimos Registros</h2>
        <div class="overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 text-gray-600 text-sm">
                        <th class="p-3 border-b">ID</th>
                        <th class="p-3 border-b">Nombre</th>
                        <th class="p-3 border-b">Email</th>
                    </tr>
                </thead>
                <tbody>
                    {% for u in usuarios %}
                    <tr class="hover:bg-gray-50 text-sm">
                        <td class="p-3 border-b text-gray-500">{{ u[0] }}</td>
                        <td class="p-3 border-b font-medium">{{ u[1] }}</td>
                        <td class="p-3 border-b text-gray-500">{{ u[2] }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="3" class="p-4 text-center text-gray-500">No hay usuarios registrados aún.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
