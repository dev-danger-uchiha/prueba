<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Flask App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-50 text-gray-800 font-sans antialiased">
    <nav class="bg-green-700 p-4 shadow-md border-b-4 border-green-900">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-white text-2xl font-bold tracking-wider flex items-center gap-2">
                ⚽ FutbolApp
            </a>
            <div class="space-x-4 font-semibold">
                <a href="/" class="text-green-100 hover:text-white transition">El Estadio (Inicio)</a>
                <a href="/registro"
                    class="bg-yellow-400 text-green-900 px-4 py-2 rounded shadow hover:bg-yellow-300 transition">Fichar (Registrarse)</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            class="p-4 mb-4 rounded {% if category == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>

</html>
