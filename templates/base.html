<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QA Flask App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800 font-sans antialiased">
    <nav class="bg-indigo-600 p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <a href="/" class="text-white text-xl font-bold tracking-wider">QA Demo App</a>
            <div class="space-x-4">
                <a href="/" class="text-indigo-100 hover:text-white transition">Inicio</a>
                <a href="/registro"
                    class="bg-white text-indigo-600 px-4 py-2 rounded shadow hover:bg-gray-100 transition">Registrarse</a>
            </div>
        </div>
    </nav>

    <main class="container mx-auto mt-10 p-4">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, message in messages %}
        <div
            class="p-4 mb-4 rounded {% if category == 'success' %}bg-green-100 text-green-700{% else %}bg-red-100 text-red-700{% endif %}">
            {{ message }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </main>
</body>

</html>
